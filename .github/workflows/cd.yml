name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build API image
      run: |
        docker build -f infrastructure/docker/Dockerfile.api -t smooth-operator-api:latest .

    - name: Build Worker image
      run: |
        docker build -f infrastructure/docker/Dockerfile.worker -t smooth-operator-worker:latest .
