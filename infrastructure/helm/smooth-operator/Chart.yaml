# =============================================================================
# Chart.yaml — Helm Chart Metadata
# =============================================================================
# Defines the Helm chart for deploying The Smooth Operator.
# Install: helm install smooth-operator ./infrastructure/helm/smooth-operator
# =============================================================================
apiVersion: v2
name: smooth-operator
description: >-
  AI-powered cold outreach engine — deploys the FastAPI API server,
  Celery workers, and supporting infrastructure (Redis, PostgreSQL, ChromaDB)
  with monitoring via Prometheus and Grafana.
type: application
version: 0.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.25.0"

maintainers:
  - name: Smooth Operator Team
    email: team@smoothoperator.dev
    url: https://github.com/smoothop/smooth-operator

keywords:
  - llmops
  - ai
  - outreach
  - fastapi
  - celery
  - rag

home: https://github.com/smoothop/smooth-operator
sources:
  - https://github.com/smoothop/smooth-operator
icon: https://raw.githubusercontent.com/smoothop/smooth-operator/main/docs/logo.png

dependencies:
  # Optional: use Bitnami sub-charts for production-grade databases.
  # Uncomment and run `helm dependency update` to use these instead of
  # our built-in templates.
  # - name: postgresql
  #   version: "~13.0"
  #   repository: "https://charts.bitnami.com/bitnami"
  #   condition: postgresql.enabled
  # - name: redis
  #   version: "~18.0"
  #   repository: "https://charts.bitnami.com/bitnami"
  #   condition: redis.enabled

annotations:
  category: AI/ML
  licenses: MIT
