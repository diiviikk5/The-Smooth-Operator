# =============================================================================
# redis-deployment.yaml — Redis Deployment + Service
# =============================================================================
# Redis serves as:
#   - Celery message broker (task queue)
#   - Result backend for task results
#   - Application-level cache (lead data, embeddings)
#   - Rate limiter token bucket storage
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smooth-operator-redis
  namespace: smooth-operator
  labels:
    app.kubernetes.io/name: smooth-operator-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: smooth-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: smooth-operator-redis
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smooth-operator-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: smooth-operator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          # Enable AOF persistence + memory limit
          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - "512mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - "60"
            - "1000"
            - "--loglevel"
            - "notice"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: smooth-operator-redis-pvc
---
# =============================================================================
# PersistentVolumeClaim — Redis data persistence
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smooth-operator-redis-pvc
  namespace: smooth-operator
  labels:
    app.kubernetes.io/name: smooth-operator-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: smooth-operator
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
# =============================================================================
# Service — Exposes Redis within the cluster
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: smooth-operator-redis
  namespace: smooth-operator
  labels:
    app.kubernetes.io/name: smooth-operator-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: smooth-operator
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app.kubernetes.io/name: smooth-operator-redis
    app.kubernetes.io/component: cache
